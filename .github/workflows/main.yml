name: Container para Executar Jobs
on: 
    workflow_dispatch:  
jobs:
    build-test:
        runs-on: ubuntu-latest
        steps:
            - name: Executor do Runner
              run: cat/etc/os-release
            - name: Execução no container
              uses: docker://alpine:latest
              with:
                entrypoint: cat
                args: cat/etc/os-release
